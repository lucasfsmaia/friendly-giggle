  <link rel="stylesheet" href="_ds/hypera-pharma-design-system-e2c335aa-af70-4a79-b177-492cc92cb02a/tokens/typography.css">
  <link rel="stylesheet" href="_ds/hypera-pharma-design-system-e2c335aa-af70-4a79-b177-492cc92cb02a/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Asap:wght@400;500;600;700&amp;display=swap">
  <script src="_ds/hypera-pharma-design-system-e2c335aa-af70-4a79-b177-492cc92cb02a/_ds_bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<div style="font-family:'Asap',sans-serif;">
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#074878"></rect><g transform="translate(30,32)"><rect x="0" y="20" width="8" height="16" rx="1.5" fill="#00BFDF"></rect><rect x="12" y="10" width="8" height="26" rx="1.5" fill="#A9D0EE"></rect><rect x="24" y="2" width="8" height="34" rx="1.5" fill="#fff"></rect></g></svg></template>
<x-import component-from-global-scope="deck-stage" from="./deck-stage.js" width="1920" height="1080" hint-size="100%,100%" data-uneditable="">
  <section data-label="Capa" style="position:relative; overflow:hidden; background:#074878;">
    <img src="assets/cover-blue-textured.jpg" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.55;">
    <div style="position:absolute; inset:0; background:linear-gradient(105deg, rgba(7,72,120,.94) 0%, rgba(0,98,170,.78) 55%, rgba(0,191,223,.35) 100%);"></div>
    <div style="position:relative; height:100%; box-sizing:border-box; padding:110px 120px; display:flex; flex-direction:column; justify-content:space-between; color:#fff;">
      
      <div>
        <div style="display:inline-block; font-size:22px; letter-spacing:.14em; text-transform:uppercase; color:#A9D0EE; font-weight:600; margin-bottom:26px;">Inteligência de Mercado · Farma · Versão completa (impressão)</div>
        <h1 style="font-size:88px; line-height:1.04; font-weight:700; margin:0; max-width:1250px;">Mercado de Emagrecimento<br>GLP-1</h1>
        <div style="width:96px; height:6px; background:#00BFDF; border-radius:800px; margin:38px 0 30px;"></div>
        <p id="pcapaSub" style="font-size:34px; font-weight:500; margin:0; color:#EDF6FC;">Todas as visões · PPP (R$) e Unidades · FMB IQVIA (30 dias)</p>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <span id="pcapaRef" style="font-size:26px; font-weight:700; background:#00BFDF; color:#074878; padding:10px 24px; border-radius:800px;">Referência: jun/26 · parcial</span>
        <span id="pcapaAt" style="font-size:22px; color:#A9D0EE;">Atualizado em 14/jul/26</span>
      </div>
    </div>
  </section>
</x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    if (!window.BASE_EMAGRECIMENTO) { const s = document.createElement('script'); s.src = 'base-emagrecimento.js?v=' + Date.now(); document.head.appendChild(s); }
    this._wait();
  }
  _wait(n = 0) {
    if (window.Chart && window.CALC && window.BASE_EMAGRECIMENTO && document.querySelector('deck-stage')) return this._build();
    if (n > 200) return;
    setTimeout(() => this._wait(n + 1), 60);
  }

  _build() {
    const C = window.CALC, stage = document.querySelector('deck-stage');
    if (window.ChartDataLabels) Chart.register(window.ChartDataLabels);
    Chart.defaults.font.family = "'Asap', sans-serif";
    Chart.defaults.color = '#5D5F61';
    Chart.defaults.animation = false;
    Chart.defaults.set('plugins.tooltip', {
      backgroundColor: 'rgba(7,72,120,.96)', titleColor: '#fff', bodyColor: '#EDF6FC',
      titleFont: { family: "'Asap', sans-serif", size: 14, weight: '700' },
      bodyFont: { family: "'Asap', sans-serif", size: 13 },
      padding: 12, cornerRadius: 8, boxPadding: 6, usePointStyle: true,
      borderColor: 'rgba(0,191,223,.55)', borderWidth: 1
    });
    let uid = 0;
    const jobs = [];
    const light = (c) => ['#A9D0EE', '#C6D9E6', '#3E9BD6', '#00BFDF', '#8FB4CE', '#7FB2D9', '#5AA0CF'].includes(c);
    const uLbl = (u) => u === 'PPP' ? 'PPP (R$ MM)' : u === 'CPP' ? 'CPP (R$ MM)' : 'Unidades (Mil)';

    const subShare = (obj) => {
      const per = C.periodos, tot = per.map((_, i) => Object.values(obj).reduce((a, s) => a + s[i], 0)), o = {};
      for (const [k, arr] of Object.entries(obj)) o[k] = arr.map((v, i) => tot[i] ? Math.round(v / tot[i] * 1000) / 10 : 0);
      return o;
    };
    const subMarca = (u, mol) => { const raw = C.raw(u, 'marca'), o = {}; for (const [m, s] of Object.entries(raw)) if (C.mapa[m].molecula === mol) o[m] = s; return o; };
    const subCorpBy = (u, mol) => { const sub = subMarca(u, mol), o = {}; for (const [m, s] of Object.entries(sub)) { const c = C.mapa[m].corporacao; if (!o[c]) o[c] = s.map(() => 0); s.forEach((v, i) => o[c][i] += v); } return C.ordenar(o); };
    const marcasCorp = (u, corp) => { const raw = C.raw(u, 'marca'), o = {}; for (const [m, s] of Object.entries(raw)) if (C.mapa[m].corporacao === corp) o[m] = s; return o; };
    const molCorp = (u, corp) => { const sub = marcasCorp(u, corp), o = {}; for (const [m, s] of Object.entries(sub)) { const ml = C.mapa[m].molecula; if (!o[ml]) o[ml] = s.map(() => 0); s.forEach((v, i) => o[ml][i] += v); } return C.ordenar(o); };

    const stack = (el, dataObj, order, percent) => {
      new Chart(el.getContext('2d'), window.HYReport.stackConfig({ dataObj, order, percent, barR: 0 }, { periodos: C.periodos, unit: 'R$ MM', rotulos: true, eixoY: false, animation: false, tooltip: false, maxTicks: 13 }));
    };
    const capOf = (obj) => {
      const L = C.periodos.length - 1; let lead = null;
      for (const [k, s] of Object.entries(obj)) if (!lead || s[L] > lead.v) lead = { k, v: s[L] };
      const tot = C.periodos.map((_, i) => Object.values(obj).reduce((a, s) => a + s[i], 0));
      const g = C.cresc(tot)[L];
      return 'Líder: <b style="color:#0062AA;">' + lead.k + '</b> (' + C.fmtNum(tot[L] ? lead.v / tot[L] * 100 : 0, 1) + '%) · mercado ' + (g != null ? C.fmtPct(g, 0) : '—') + (C.periodos.length > 12 ? ' vs. ano ant. (MAA)' : ' vs. mês ant. (MA)');
    };

    const push = (el) => stage.appendChild(el);
    const _M = window.BASE_EMAGRECIMENTO.META || {};
    const perTxt = (_M.referencia || '') + (_M.parcial ? ' · parcial' : '');
    const selo = (u) => (u ? uLbl(u) + ' · ' : '') + perTxt;
    const seloHtml = (u) => { const pill = (t) => `<span style="flex:none;font-size:22px;font-weight:600;color:#0062AA;background:#EDF6FC;border:1px solid #A9D0EE;padding:8px 20px;border-radius:800px;white-space:nowrap;">${t}</span>`; return `<span style="display:flex;align-items:center;gap:10px;flex:none;">${u ? pill(uLbl(u)) : ''}${pill(perTxt)}</span>`; };
    const hdr = (title, mb = 20, u = null) => `<div style="display:flex;align-items:center;justify-content:space-between;gap:18px;margin:0 0 ${mb}px;"><div style="display:flex;align-items:center;gap:18px;min-width:0;"><div style="width:6px;height:42px;background:#00BFDF;border-radius:800px;flex:none;"></div><h2 style="font-size:44px;font-weight:700;color:#292A2B;margin:0;">${title}</h2></div>${seloHtml(u)}</div>`;
    { const _cr = document.getElementById('pcapaRef'); if (_cr) _cr.textContent = 'Referência: ' + perTxt; const _ca = document.getElementById('pcapaAt'); if (_ca && _M.atualizadoEm) _ca.textContent = 'Atualizado em ' + _M.atualizadoEm; const _ps = document.getElementById('pcapaSub'); if (_ps) _ps.textContent = 'Todas as visões · ' + (C.hasCPP ? 'PPP (R$), CPP (R$) e Unidades' : 'PPP (R$) e Unidades') + ' · FMB IQVIA (30 dias)'; }
    const twoPanel = (label, title, lt, lf, rt, rf, cap, u) => {
      const s = document.createElement('section'); s.setAttribute('data-label', label); s.style.cssText = 'background:#fff;';
      const l = 'c' + (uid++), r = 'c' + (uid++);
      s.innerHTML = `<div style="height:100%;box-sizing:border-box;padding:56px 64px 44px;display:flex;flex-direction:column;">
        ${hdr(title, 20, u)}
        <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:24px;min-height:0;">
          <div style="border:1px solid #EFEFEF;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;min-height:0;"><div style="font-size:24px;font-weight:700;color:#292A2B;margin-bottom:8px;">${lt}</div><div style="flex:1;position:relative;min-height:0;"><canvas id="${l}"></canvas></div></div>
          <div style="border:1px solid #EFEFEF;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;min-height:0;"><div style="font-size:24px;font-weight:700;color:#292A2B;margin-bottom:8px;">${rt}</div><div style="flex:1;position:relative;min-height:0;"><canvas id="${r}"></canvas></div></div>
        </div>
        <div style="font-size:20px;color:#434445;margin-top:14px;">${cap || ''}</div></div>`;
      push(s); jobs.push(() => { lf(document.getElementById(l)); rf(document.getElementById(r)); });
    };
    const divider = (num, title, sub) => {
      const s = document.createElement('section'); s.setAttribute('data-label', 'Seção · ' + title);
      s.style.cssText = 'position:relative;background:linear-gradient(120deg,#074878 0%,#0062AA 100%);overflow:hidden;';
      s.innerHTML = `<div style="position:absolute;right:-160px;bottom:-160px;width:640px;height:640px;border-radius:50%;background:rgba(0,191,223,.16);"></div>
        <div style="position:relative;height:100%;box-sizing:border-box;padding:120px;display:flex;flex-direction:column;justify-content:center;color:#fff;">
          <div style="font-size:200px;font-weight:700;color:rgba(255,255,255,.14);line-height:1;">${num}</div>
          <div style="width:96px;height:6px;background:#00BFDF;border-radius:800px;margin:8px 0 34px;"></div>
          <h2 style="font-size:76px;font-weight:700;margin:0;">${title}</h2>
          <p style="font-size:32px;color:#A9D0EE;margin:24px 0 0;max-width:1100px;">${sub}</p></div>`;
      push(s);
    };

    const segPage = (u) => {
      const raw = C.raw(u, 'segmento'), tot = C.total(u), L = C.periodos.length - 1, g = C.cresc(tot)[L];
      const seg = C.share(u, 'segmento');
      const cap = 'Mercado total ' + (u === 'Unidades' ? '' : 'R$ ') + C.fmtNum(tot[L], 0) + ' ' + (u === 'Unidades' ? 'Mil' : 'MM') + ' · segmento target ' + C.fmtNum(seg['Segmento target'][L], 1) + '% · crescimento ' + (g != null ? C.fmtPct(g, 0) : '—');
      twoPanel('Mercado · ' + u, 'Mercado total vs. segmento target', 'Sell-out', el => stack(el, { 'Segmento target': raw['Segmento target'], 'Outros': raw['Outros'] }, ['Segmento target', 'Outros'], false), 'Representatividade (%)', el => stack(el, seg, ['Segmento target', 'Outros'], true), cap, u);
    };
    const dimPage = (u, dim, name) => {
      const raw = (dim === 'corporacao' || dim === 'canal') ? C.raw(u, dim) : C.ordenar(C.raw(u, dim));
      const order = dim === 'canal' ? ['Indireto', 'Direto'] : Object.keys(raw);
      twoPanel(name + ' · ' + u, name + ' — sell-out e market share', 'Sell-out', el => stack(el, raw, order, false), 'Market share (%)', el => stack(el, C.share(u, dim), order, true), capOf(raw), u);
    };
    const subPage = (u, mol) => {
      const m = C.ordenar(subMarca(u, mol)), c = subCorpBy(u, mol);
      twoPanel(mol + ' · ' + u, mol + ' — marca e corporação', 'Market share por marca (%)', el => stack(el, subShare(m), Object.keys(m), true), 'Market share por corporação (%)', el => stack(el, subShare(c), Object.keys(c), true), capOf(m), u);
    };
    const concPage = (u, mol) => {
      const obj = C.B.VENDAS[u].concentracao[mol], order = Object.keys(obj);
      twoPanel('Conc ' + mol + ' · ' + u, 'Dosagem — ' + mol, 'Sell-out por dosagem', el => stack(el, obj, order, false), 'Representatividade (%)', el => stack(el, subShare(obj), order, true), capOf(obj), u);
    };
    const corpPage = (u, corp) => {
      const marcas = C.ordenar(marcasCorp(u, corp)), order = Object.keys(marcas);
      const tot = C.periodos.map((_, i) => Object.values(marcas).reduce((a, s) => a + s[i], 0)), mkt = C.total(u), L = C.periodos.length - 1;
      const g = C.cresc(tot)[L];
      const cap = 'Sell-out ' + (u === 'Unidades' ? '' : 'R$ ') + C.fmtNum(tot[L], 0) + ' ' + (u === 'Unidades' ? 'Mil' : 'MM') + ' · share no mercado ' + C.fmtNum(mkt[L] ? tot[L] / mkt[L] * 100 : 0, 1) + '% · crescimento ' + (g != null ? C.fmtPct(g, 0) : '—');
      twoPanel('Corp ' + corp + ' · ' + u, 'One Page Corporação — ' + corp, 'Sell-out por marca', el => stack(el, marcas, order, false), 'Mix por marca (%)', el => stack(el, subShare(marcas), order, true), cap, u);
    };

    const canalOPPage = (u, canal) => {
      const marcas = C.ordenar(C.agrupar(u, 'marca', { canal })), order = Object.keys(marcas);
      const tot = C.periodos.map((_, i) => Object.values(marcas).reduce((a, s) => a + s[i], 0)), mkt = C.total(u), L = C.periodos.length - 1;
      const g = C.cresc(tot)[L];
      const cap = 'Sell-out ' + (u === 'Unidades' ? '' : 'R$ ') + C.fmtNum(tot[L], 0) + ' ' + (u === 'Unidades' ? 'Mil' : 'MM') + ' · share no mercado ' + C.fmtNum(mkt[L] ? tot[L] / mkt[L] * 100 : 0, 1) + '% · crescimento ' + (g != null ? C.fmtPct(g, 0) : '—');
      twoPanel('Canal ' + canal + ' · ' + u, 'One Page Canal — ' + canal, 'Sell-out por marca', el => stack(el, marcas, order, false), 'Mix por marca (%)', el => stack(el, subShare(marcas), order, true), cap, u);
    };

    const precoConc = (par, dose) => {
      const s = document.createElement('section'); s.setAttribute('data-label', 'Preço ' + par.concorrente + ' ' + dose); s.style.cssText = 'background:#fff;';
      const cid = 'c' + (uid++);
      const rows = Object.entries(par.dosagens).map(([dz, d]) => { const med = C.precoMedia(d), desc = C.desconto(d), on = dz === dose; const dc = desc <= -30 ? '#1E9E63' : (desc < 0 ? '#0062AA' : '#D64545'); return `<tr style="border-bottom:1px solid #EFEFEF;background:${on ? '#EDF6FC' : '#fff'};"><td style="padding:14px;font-size:24px;font-weight:700;color:#292A2B;">${dz}</td><td style="padding:14px;font-size:22px;text-align:right;color:#434445;">${C.fmtR$(d.ref, 0)}</td><td style="padding:14px;font-size:22px;text-align:right;font-weight:600;color:#0062AA;">${C.fmtR$(med, 0)}</td><td style="padding:14px;text-align:right;"><span style="font-size:24px;font-weight:700;color:${dc};">${C.fmtPct(desc)}</span></td></tr>`; }).join('');
      s.innerHTML = `<div style="height:100%;box-sizing:border-box;padding:56px 64px 44px;display:flex;flex-direction:column;">
        ${hdr('Preço — ' + par.referencia + ' vs. ' + par.concorrente, 6, null)}
        <p style="font-size:22px;color:#5D5F61;margin:0 0 18px;">Desconto por dosagem · evolução semanal (${dose})</p>
        <div style="flex:1;display:grid;grid-template-columns:1fr 1.15fr;gap:28px;min-height:0;">
          <div><table style="width:100%;border-collapse:collapse;"><thead><tr style="border-bottom:2px solid #0062AA;"><th style="padding:12px;text-align:left;font-size:19px;color:#5D5F61;font-weight:600;">Dosagem</th><th style="padding:12px;text-align:right;font-size:19px;color:#5D5F61;font-weight:600;">${par.referencia}</th><th style="padding:12px;text-align:right;font-size:19px;color:#5D5F61;font-weight:600;">${par.concorrente}</th><th style="padding:12px;text-align:right;font-size:19px;color:#5D5F61;font-weight:600;">Desconto</th></tr></thead><tbody>${rows}</tbody></table></div>
          <div style="border:1px solid #EFEFEF;border-radius:14px;padding:18px 22px;position:relative;min-height:0;"><canvas id="${cid}"></canvas></div>
        </div></div>`;
      push(s);
      jobs.push(() => { const d = par.dosagens[dose]; new Chart(document.getElementById(cid).getContext('2d'), { type: 'line', data: { labels: C.B.PRECOS.semanas, datasets: [ { label: par.referencia + ' (ref.)', data: d.evRef, borderColor: C.cor('Preço ref.'), backgroundColor: C.cor('Preço ref.'), borderWidth: 3, tension: .25, pointRadius: 4, datalabels: { display: true, align: 'top', color: '#074878', font: { size: 12, weight: '700' }, formatter: v => C.fmtR$(v, 0) } }, { label: par.concorrente, data: d.evConc, borderColor: C.cor('Preço conc.'), backgroundColor: C.cor('Preço conc.'), borderWidth: 3, tension: .25, pointRadius: 4, datalabels: { display: true, align: 'bottom', color: '#0062AA', font: { size: 12, weight: '700' }, formatter: v => C.fmtR$(v, 0) } } ] }, options: { responsive: true, maintainAspectRatio: false, animation: false, layout: { padding: { top: 20, bottom: 8 } }, plugins: { legend: { position: 'bottom', labels: { font: { size: 15 }, padding: 14 } }, tooltip: { enabled: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 14 } } }, y: { display: false, beginAtZero: false } } } }); });
    };

    const snapPage = (par) => {
      const s = document.createElement('section'); s.setAttribute('data-label', 'Preço ' + par.referencia); s.style.cssText = 'background:#fff;';
      const rows = Object.entries(par.dosagens).map(([dz, d]) => {
        const med = C.precoMedia(d), desc = C.desconto(d), menor = Math.min(...d.porPdv);
        const dc = desc <= -30 ? '#1E9E63' : (desc < 0 ? '#0062AA' : '#D64545');
        return `<tr style="border-bottom:1px solid #EFEFEF;"><td style="padding:18px 16px;font-size:26px;font-weight:700;color:#292A2B;">${dz}</td><td style="padding:18px 16px;font-size:24px;text-align:right;color:#434445;">${C.fmtR$(d.ref, 0)}</td><td style="padding:18px 16px;font-size:24px;text-align:right;font-weight:600;color:#0062AA;">${C.fmtR$(med, 0)}</td><td style="padding:18px 16px;font-size:24px;text-align:right;color:#5D5F61;">${C.fmtR$(menor, 0)}</td><td style="padding:18px 16px;text-align:right;"><span style="font-size:26px;font-weight:700;color:${dc};">${C.fmtPct(desc)}</span></td></tr>`;
      }).join('');
      s.innerHTML = `<div style="height:100%;box-sizing:border-box;padding:56px 64px 44px;display:flex;flex-direction:column;">
        ${hdr('Preço por dosagem — ' + par.referencia + ' vs. ' + par.concorrente, 24, null)}
        <table style="width:100%;border-collapse:collapse;"><thead><tr style="border-bottom:2px solid #0062AA;">
          <th style="padding:14px 16px;text-align:left;font-size:20px;color:#5D5F61;font-weight:600;">Dosagem</th><th style="padding:14px 16px;text-align:right;font-size:20px;color:#5D5F61;font-weight:600;">${par.referencia} (ref.)</th><th style="padding:14px 16px;text-align:right;font-size:20px;color:#5D5F61;font-weight:600;">${par.concorrente} · média</th><th style="padding:14px 16px;text-align:right;font-size:20px;color:#5D5F61;font-weight:600;">Menor PDV</th><th style="padding:14px 16px;text-align:right;font-size:20px;color:#5D5F61;font-weight:600;">Desconto</th>
        </tr></thead><tbody>${rows}</tbody></table></div>`;
      push(s);
    };
    const evolPage = (par, dz) => {
      const P = C.B.PRECOS, d = par.dosagens[dz]; const cid = 'c' + (uid++);
      const s = document.createElement('section'); s.setAttribute('data-label', 'Preço ' + par.concorrente + ' ' + dz); s.style.cssText = 'background:#fff;';
      const rows = P.semanas.map((wk, i) => { const med = d.evConc[i], desc = (med / d.evRef[i] - 1) * 100, prev = i > 0 ? (med / d.evConc[i - 1] - 1) * 100 : null; const pc = prev == null ? '#5D5F61' : (prev < 0 ? '#1E9E63' : (prev > 0 ? '#D64545' : '#5D5F61')); return `<tr style="border-bottom:1px solid #EFEFEF;"><td style="padding:13px 12px;font-size:21px;font-weight:600;color:#292A2B;">${wk}</td><td style="padding:13px 12px;font-size:21px;text-align:right;color:#0062AA;font-weight:600;">${C.fmtR$(med, 0)}</td><td style="padding:13px 12px;font-size:21px;text-align:right;color:#434445;">${C.fmtNum(desc, 1)}%</td><td style="padding:13px 12px;font-size:21px;text-align:right;color:${pc};">${prev == null ? '—' : C.fmtPct(prev)}</td></tr>`; }).join('');
      s.innerHTML = `<div style="height:100%;box-sizing:border-box;padding:56px 64px 44px;display:flex;flex-direction:column;">
        ${hdr('Evolução de preço — ' + par.referencia + ' vs. ' + par.concorrente + ' · ' + dz, 18, null)}
        <div style="flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:24px;min-height:0;">
          <div style="border:1px solid #EFEFEF;border-radius:14px;padding:18px 22px;position:relative;min-height:0;"><canvas id="${cid}"></canvas></div>
