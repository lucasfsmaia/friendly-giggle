name: Build e Deploy no GitHub Pages

# Publica o site a cada push na main. NÃO gera nem copia nada: publica os
# arquivos JÁ EMPACOTADOS que estão na raiz do repositório — index.html (deck),
# relatorio-print.html (PDF) e atualizador.html —, apenas validando que existem.
# Isso torna o index.html determinístico (sempre o bundle do deck), sem risco
# de a etapa de build sobrescrevê-lo com o arquivo errado.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar bundles publicados (não gera nada)
        run: |
          set -euo pipefail
          req=("index.html" "relatorio-print.html" "atualizador.html" "base-emagrecimento.js" ".nojekyll")
          for f in "${req[@]}"; do
            [ -f "$f" ] || { echo "::error::Arquivo obrigatório ausente na raiz: $f"; exit 1; }
          done
          echo "OK: publicando bundles prontos (index.html = deck)."

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar a raiz do repositório
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
